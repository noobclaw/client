<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 260px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    h1 img { width: 22px; height: 22px; border-radius: 4px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status.connected { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); }
    .status.disconnected { background: rgba(255, 80, 80, 0.1); border: 1px solid rgba(255, 80, 80, 0.3); }
    .status.connecting { background: rgba(255, 200, 50, 0.1); border: 1px solid rgba(255, 200, 50, 0.3); }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #00ff88; }
    .dot.red { background: #ff5050; }
    .dot.yellow { background: #ffc832; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.5; } }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: #333; color: #ccc; }
    button:hover { background: #444; color: #fff; }
    .hint { font-size: 11px; color: #666; margin-top: 10px; line-height: 1.5; }
    .hint.error { color: #ff8080; }
  </style>
</head>
<body>
  <h1><img src="icons/icon48.png" alt=""> NoobClaw</h1>

  <div id="status" class="status disconnected">
    <span id="dot" class="dot red"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <button id="reconnectBtn">Reconnect</button>

  <p id="hint" class="hint">Automatically connects to NoobClaw desktop client. Make sure NoobClaw is running.</p>

  <script src="popup.js"></script>
</body>
</html>
