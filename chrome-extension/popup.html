<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    h1 img { width: 24px; height: 24px; border-radius: 4px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status.connected { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); }
    .status.disconnected { background: rgba(255, 80, 80, 0.1); border: 1px solid rgba(255, 80, 80, 0.3); }
    .status.connecting { background: rgba(255, 200, 50, 0.1); border: 1px solid rgba(255, 200, 50, 0.3); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #00ff88; }
    .dot.red { background: #ff5050; }
    .dot.yellow { background: #ffc832; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.5; } }
    label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #333; border-radius: 6px; background: #0d0d1a; color: #e0e0e0; font-size: 13px; outline: none; margin-bottom: 10px; }
    input:focus { border-color: #00ff88; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    button.primary { background: #00ff88; color: #000; }
    button.primary:hover { background: #00cc6a; }
    button.danger { background: #ff5050; color: #fff; }
    button.danger:hover { background: #cc3030; }
    .hint { font-size: 11px; color: #666; margin-top: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <h1><img src="icons/icon48.png" alt=""> NoobClaw</h1>

  <div id="status" class="status disconnected">
    <span id="dot" class="dot red"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <div id="connectForm">
    <div class="row">
      <div style="flex:1">
        <label>Port</label>
        <input type="number" id="port" value="12580" placeholder="12580">
      </div>
      <div style="flex:2">
        <label>Token</label>
        <input type="text" id="token" placeholder="Paste token from NoobClaw">
      </div>
    </div>
    <button id="connectBtn" class="primary">Connect</button>
  </div>

  <div id="disconnectForm" style="display:none">
    <button id="disconnectBtn" class="danger">Disconnect</button>
  </div>

  <p class="hint">Token can be found in NoobClaw Settings &gt; Browser Assistant.</p>

  <script src="popup.js"></script>
</body>
</html>
