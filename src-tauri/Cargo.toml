[package]
name = "noobclaw"
version = "1.0.0"
description = "NoobClaw - AI Desktop Assistant"
authors = ["NoobClaw"]
edition = "2021"

[lib]
name = "noobclaw_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
