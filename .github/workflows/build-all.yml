name: Build All Platforms

on:
  workflow_dispatch:

jobs:
  build-win-x64:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (Windows x64)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: NoobClaw-win-x64
          path: |
            release/*.exe
            !release/*-unpacked/**
          retention-days: 30

  build-mac-x64:
    name: macOS Intel (x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (x64)
        run: npm run dist:mac:x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload x64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: NoobClaw-mac-x64
          path: release/*.dmg
          retention-days: 30

  build-mac-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (arm64)
        run: npm run dist:mac:arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: NoobClaw-mac-arm64
          path: release/*.dmg
          retention-days: 30
