name: Build Tauri

on:
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          # Intel macOS via macos-13 (known-working pre-Tauri). The
          # macos-15-intel runner was pegging at >6h for Rust compile;
          # macos-13 has dedicated x86_64 hardware that historically
          # completed in 10-15 min. If this times out too, fall back to
          # universal binary via `cargo build --target universal-apple-darwin`.
          - platform: macos-13
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Sync version from package.json
        # Single source of truth is package.json. This writes the same
        # version into src-tauri/tauri.conf.json, src-tauri/Cargo.toml,
        # and src/main/sidecar-server.ts so every artifact carries the
        # same number. Run BEFORE build-sidecar so the sidecar's
        # /api/version endpoint reports the bumped version too.
        run: node scripts/sync-version.js

      - name: Install @yao-pkg/pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build macOS native desktop addon
        # Compiles native/macos-desktop/src/noobclaw_desktop.mm into a
        # .node addon used by the sidecar's desktopControlMcp for fast
        # screenshots (CGDisplayCreateImage), smooth 60fps mouse motion
        # (CGEvent), real keyboard input (CGEvent + UnicodeString),
        # clipboard read/verify (NSPasteboard) and active-window lookup
        # (NSWorkspace + CGWindowListCopyWindowInfo).
        # prepare-tauri-resources.js picks the build output up and
        # copies it into src-tauri/resources/native/ so Tauri bundles
        # it alongside the sidecar binary.
        if: runner.os == 'macOS'
        working-directory: native/macos-desktop
        run: |
          npm install
          npx node-gyp rebuild --verbose
          test -f build/Release/noobclaw_desktop.node
          lipo -info build/Release/noobclaw_desktop.node || file build/Release/noobclaw_desktop.node

      - name: Build Windows native desktop addon
        # Compiles native/win-desktop/src/noobclaw_desktop_win.cc into a
        # .node addon. Uses BitBlt for screenshots and SendInput for
        # mouse / keyboard, replacing the slow PowerShell subprocess
        # fallbacks in desktopControlMcp.ts.
        if: runner.os == 'Windows'
        working-directory: native/win-desktop
        shell: bash
        run: |
          npm install
          npx node-gyp rebuild --verbose
          test -f build/Release/noobclaw_desktop_win.node

      - name: Build sidecar
        run: node scripts/build-sidecar.js

      - name: Prepare Tauri resources
        run: node scripts/prepare-tauri-resources.js

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Import code signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          CSC_KEY: ${{ secrets.CSC_KEY }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$APPLE_CERT_BASE64" | base64 --decode > /tmp/cert.cer
          echo "$CSC_KEY" > /tmp/key.pem
          openssl x509 -inform DER -in /tmp/cert.cer -out /tmp/cert.pem
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -passout pass:"$CSC_KEY_PASSWORD"
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          # Extract signing identity for Tauri
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "Found signing identity: $IDENTITY"

      - name: Pre-sign native addon (macOS)
        # Tauri's bundler signs externalBin binaries in Contents/MacOS/
        # but does NOT reach Mach-O files nested under Contents/Resources/.
        # Our noobclaw_desktop.node ends up at
        # Contents/Resources/resources/native/ and the notary service
        # rejects the whole bundle with "The signature does not include a
        # secure timestamp." unless we pre-sign it ourselves with
        # --timestamp --options runtime using the imported identity.
        # Signing it BEFORE Tauri build means Tauri's subsequent deep
        # sign either leaves it alone (signature already valid) or
        # re-signs with the same settings, both of which notarization
        # accepts.
        if: runner.os == 'macOS'
        run: |
          ADDON=src-tauri/resources/native/noobclaw_desktop.node
          if [ -f "$ADDON" ]; then
            codesign --force --timestamp --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" "$ADDON"
            codesign -dvv "$ADDON" || true
          else
            echo "ERROR: $ADDON not found — prepare-tauri-resources.js should have copied it"
            ls -la src-tauri/resources/native/ || true
            exit 1
          fi

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          # Tauri v2 uses these for automatic codesign + notarization
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri v2's macOS dmg bundler normally passes `--skip-jenkins`
          # to bundle_dmg.sh when it detects `CI=true`, which skips the
          # Finder-prettifying AppleScript — the one step that actually
          # applies our tauri.conf.json appPosition / applicationFolderPosition
          # values. Without it the DMG ships with the default Finder
          # layout (Applications on the left, app on the right) and all
          # our icon-position config is silently ignored.
          #
          # Setting TAURI_BUNDLER_DMG_IGNORE_CI="true" tells Tauri to NOT
          # add --skip-jenkins, so the AppleScript runs and our positions
          # actually show up in the generated .DS_Store. Must be the
          # exact string "true" — Tauri's check is
          #   env::var_os("TAURI_BUNDLER_DMG_IGNORE_CI") != "true"
          # (see tauri-bundler/src/bundle/macos/dmg/mod.rs).
          TAURI_BUNDLER_DMG_IGNORE_CI: 'true'

      # NOTE: Info.plist extras (ATS loopback exception, TCC usage
      # descriptions, LSApplicationCategoryType, NSHumanReadableCopyright)
      # are now merged via src-tauri/Info.plist which Tauri v2's bundler
      # picks up automatically via bundle.macOS.infoPlist defaulting to
      # the file next to tauri.conf.json. Merging happens BEFORE codesign
      # and notarization so no post-build step or re-sign is needed.
      # Previously we had a `node scripts/patch-macos-plist.js` step here
      # that ran after tauri build — it failed because Tauri cleans the
      # staged .app once the dmg has been bundled, leaving no plist to
      # patch on disk.

      - name: Verify macOS codesign
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Verifying: $APP_PATH"
            codesign -dvvv "$APP_PATH" 2>&1 | head -10
            # If Tauri didn't notarize, do it manually
            if ! spctl --assess --type execute "$APP_PATH" 2>/dev/null; then
              echo "App not notarized by Tauri, doing manual notarization..."
              ZIP_PATH="${APP_PATH%.app}.zip"
              ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
              xcrun notarytool submit "$ZIP_PATH" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}" \
                --wait --timeout 600 || echo "Notarization failed"
              xcrun stapler staple "$APP_PATH" || echo "Stapler failed"
              rm -f "$ZIP_PATH"
            else
              echo "App already notarized by Tauri"
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noobclaw-tauri-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
